name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npx vitest run --reporter=verbose
