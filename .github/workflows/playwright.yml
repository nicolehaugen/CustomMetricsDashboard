name: Playwright Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright Dashboard Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env for CI
        run: |
          cat > .env <<'EOF'
          GITHUB_TOKEN=placeholder
          GITHUB_ORG=placeholder
          GITHUB_REPO=placeholder
          PG_HOST=postgres
          PG_PORT=5432
          PG_DATABASE=metrics
          PG_USER=postgres
          PG_PASSWORD=postgres
          PORT=3005
          DATA_MODE=seed
          DATA_SOURCE_LABEL=ci
          DATA_SOURCE_URL=https://github.com
          EOF

      - name: Create data directories
        run: mkdir -p data/raw

      - name: Start services
        run: docker compose up -d
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U postgres -d metrics; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: Apply database schema
        run: docker compose exec -T postgres psql -U postgres -d metrics < src/db/schema.sql

      - name: Wait for Grafana
        run: |
          echo "Waiting for Grafana to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3006/api/health > /dev/null 2>&1; then
              echo "Grafana is ready"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down -v
